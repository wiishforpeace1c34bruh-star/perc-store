<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — perc.store</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/style.css">
  <style>
    .login-container {
      max-width: 400px;
      margin: 8rem auto 0 auto;
      padding: 2.5rem;
      background: rgba(10, 10, 10, 0.5);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .input-group label {
      font-size: 0.875rem;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .input-group input {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border-color);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus {
      border-color: var(--accent);
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="/" class="navbar-logo font-mono">perc<span class="accent">.store</span></a>
      <div class="navbar-links font-mono">
        <a href="/">Store</a>
        <a href="#">Discord</a>
        <a href="/status.html">Status</a>
        <a href="/media.html">Media</a>
      </div>
      <div class="navbar-actions">
        <a href="/login.html" class="btn btn-outline btn-sm">Login</a>
        <a href="/purchase.html" class="btn btn-primary btn-sm">Get Access</a>
      </div>
    </div>
  </nav>

  <main class="main-content" style="padding-top: 4rem;">
    <div class="container">
      <div class="login-container">
        <div style="display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
          <button id="tab-login" class="tab-btn active" onclick="switchTab('login')" style="flex: 1; background: transparent; border: none; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer;">Sign In</button>
          <button id="tab-signup" class="tab-btn" onclick="switchTab('signup')" style="flex: 1; background: transparent; border: none; color: var(--text-secondary); font-size: 1rem; font-weight: 600; cursor: pointer;">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="form-login" action="/dashboard.html" method="GET" style="text-align: left;">
          <div class="input-group">
            <label for="login-email">Email Address</label>
            <input type="email" id="login-email" placeholder="you@example.com" required>
          </div>
          <div class="input-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; height: 2.5rem; margin-top: 1rem;">Sign In</button>
        </form>

        <!-- Sign Up Form -->
        <form id="form-signup" action="/dashboard.html" method="GET" style="text-align: left; display: none;">
          <div class="input-group">
            <label for="signup-user">Username</label>
            <input type="text" id="signup-user" placeholder="Investigator" required>
          </div>
          <div class="input-group">
            <label for="signup-email">Email Address</label>
            <input type="email" id="signup-email" placeholder="you@example.com" required>
          </div>
          <div class="input-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; height: 2.5rem; margin-top: 1rem;">Create Account</button>
        </form>
      </div>
    </div>
  </main>

  <script>
    function switchTab(tab) {
      document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
      
      document.getElementById('tab-login').style.color = tab === 'login' ? '#fff' : 'var(--text-secondary)';
      document.getElementById('tab-signup').style.color = tab === 'signup' ? '#fff' : 'var(--text-secondary)';
    }
  </script>

</body>
</html>
